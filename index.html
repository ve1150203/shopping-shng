    const codeInput = prompt("🔑 請輸入主控台驗證碼以解鎖批次列印功能：");
    if (codeInput === null) return;
    if (codeInput !== ADMIN_CODE) { alert("❌ 驗證碼錯誤！"); return; }

    const runSeafood = document.getElementById('admSeafood').checked;
    const runKimchi = document.getElementById('admKimchi').checked;
    if (!runSeafood && !runKimchi) { alert('請至少勾選一個要列印的團！'); return; }

    let allNamesSet = new Set();
    if (runSeafood) seafoodNames.forEach(n => allNamesSet.add(n));
    if (runKimchi) kimchiNames.forEach(n => allNamesSet.add(n));
    
    let boxesHTML = '';
    Array.from(allNamesSet).sort().forEach(name => {
        if (runSeafood) boxesHTML += buildInvoiceHTML('seafood', name);
        if (runKimchi) boxesHTML += buildInvoiceHTML('kimchi', name);
    });

    renderOutput(boxesHTML, "全團批次對帳單");
}

function buildInvoiceHTML(type, name) {
    let namesArr = type === 'seafood' ? seafoodNames : kimchiNames;
    let pricesArr = type === 'seafood' ? seafoodPrices : kimchiPrices;
    let itemsArr = type === 'seafood' ? seafoodItems : kimchiItems;
    let qtyMatrix = type === 'seafood' ? seafoodQuantities : kimchiQuantities;
    
    const idx = namesArr.indexOf(name);
    if (idx === -1) return '';

    let rows = '';
    let total = 0;
    for (let r = 0; r < itemsArr.length; r++) {
        let q = qtyMatrix[r][idx];
        if (q > 0) {
            let sub = q * pricesArr[r];
            total += sub;
            rows += `<tr><td>${itemsArr[r]}</td><td>${pricesArr[r]}元</td><td>${q}</td><td>${sub}元</td></tr>`;
        }
    }

    // 精準微調：直接把 0 元項目順序串接在表格內，無任何獨立區塊標題，並自動套用 CSS 內建的粉紅底 .gift-row 樣式
    if (type === 'kimchi' && name === '找到了夏天') {
        rows += `<tr class="gift-row"><td>黃金鴨掌</td><td>0元</td><td>1</td><td>0元</td></tr>`;
        rows += `<tr class="gift-row"><td>黃金泡菜420g</td><td>0元</td><td>1</td><td>0元</td></tr>`;
        rows += `<tr class="gift-row"><td>蘿大柚420g</td><td>0元</td><td>1</td><td>0元</td></tr>`;
        rows += `<tr class="gift-row"><td>黃金海帶絲420g</td><td>0元</td><td>1</td><td>0元</td></tr>`;
        rows += `<tr class="gift-row"><td>泡菜黃瓜420g</td><td>0元</td><td>1</td><td>0元</td></tr>`;
        rows += `<tr class="gift-row"><td>黃金泡菜650g</td><td>0元</td><td>2</td><td>0元</td></tr>`;
        rows += `<tr class="gift-row"><td>黃金海帶絲650g</td><td>0元</td><td>2</td><td>0元</td></tr>`;
    }

    if (total === 0 && !(type === 'kimchi' && name === '找到了夏天')) return '';

    const isPaid = localStorage.getItem(`paid_${type}_${name}`) === 'true';
    const boxClass = isPaid ? 'invoice-box paid-style' : 'invoice-box';
    const badgeText = isPaid ? '✅ 已付款' : '❌ 未付款';
    const badgeClass = isPaid ? 'payment-badge badge-paid' : 'payment-badge badge-unpaid';
    const titleText = type === 'seafood' ? '⚓ 水產（樂客）- 個人出貨明細單' : '🌶️ 協發行泡菜 - 個人出貨明細單';

    return `
    <div class="invoice-wrapper">
        <div class="${boxClass}" id="box_${type}_${name}">
            <div class="invoice-header">
                <div class="invoice-title">${titleText}</div>
                <div style="color: #718096; font-size:12px;">115年06月端午團</div>
            </div>
            <div class="user-info">
                <div>團員姓名：<span style="color:var(--primary-color); font-size:17px;">${name}</span></div>
                <span class="${badgeClass}" id="badge_${type}_${name}" onclick="togglePayment('${type}', '${name}')">${badgeText}</span>
            </div>
            <table>
                <thead><tr><th>品名規格</th><th>單價</th><th>數量</th><th>小計</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
            <div class="total-row">應付金額： ${total} 元</div>
        </div>
        <div class="cut-line"><span>✂ ------------------ 方便發貨裁切線 ------------------ ✂</span></div>
    </div>`;
}

function renderOutput(htmlContent, title) {
    const resultSection = document.getElementById('resultSection');
    if (!htmlContent) {
        resultSection.innerHTML = `<div class="no-data">❌ 找不到相關的有效訂單明細。</div>`;
    } else {
        resultSection.innerHTML = `
        <div class="print-btn-container">
            <button class="print-btn" onclick="window.print()">🖨️ 點此立即列印 (${title})</button>
        </div>
        <div class="print-grid">${htmlContent}</div>`;
    }
    resultSection.style.display = 'block';
}

function togglePayment(type, name) {
    const key = `paid_${type}_${name}`;
    const currentStatus = localStorage.getItem(key) === 'true';
    const codeInput = prompt("🔑 請輸入主控台驗證碼修改付款狀態：");
    if (codeInput === null) return;
    
    if (codeInput === ADMIN_CODE) {
        const newStatus = !currentStatus;
        localStorage.setItem(key, newStatus);
        
        const box = document.getElementById(`box_${type}_${name}`);
        const badge = document.getElementById(`badge_${type}_${name}`);
        if (!box || !badge) return;
        
        if (newStatus) {
            box.className = "invoice-box paid-style";
            badge.className = "payment-badge badge-paid";
            badge.innerText = "✅ 已付款";
        } else {
            box.className = "invoice-box";
            badge.className = "payment-badge badge-unpaid";
            badge.innerText = "❌ 未付款";
        }
    } else {
        alert("❌ 驗證碼錯誤！");
    }
}
</script>
